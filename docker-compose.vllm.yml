version: '3.8'

services:
  nemotron-3-nano:
    image: vllm/vllm-openai:latest
    container_name: vllm-nemotron-3-nano
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: >
      --model nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
      --port 8000
      --tensor-parallel-size 8
      --trust-remote-code
      --gpu-memory-utilization 0.9
      --max-model-len 65536
      --dtype auto
      --async-scheduling
      --kv-cache-dtype auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    ipc: host

networks:
  default:
    name: vllm-network
